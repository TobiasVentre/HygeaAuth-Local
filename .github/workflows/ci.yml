name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 9.0.x

      - name: Restore local tools
        run: dotnet tool restore

      - name: Build solution
        run: dotnet build AuthMS.sln --nologo

      - name: Run tests
        run: dotnet test AuthMS.sln --no-build --nologo
